name: Feature request
description: Propose an improvement to the platform
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Two notes before proposing:
        - **New observers belong in the
          [plugin catalog](https://github.com/MMagTech/orven-plugins)**,
          not the platform — "Orven should check X" is usually a plugin.
        - Orven is strictly read-only and never advises. Features that
          add remediation, automation, or alerting conflict with
          [docs/CONSTRAINTS.md](../blob/main/docs/CONSTRAINTS.md) and
          will be declined kindly.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation, not the implementation — what do you wish your morning briefing did for you?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior (optional)
  - type: textarea
    id: fit
    attributes:
      label: How does it fit a calm, read-only briefing?
      description: One sentence on why this belongs in Orven rather than a dashboard or alerting tool.
